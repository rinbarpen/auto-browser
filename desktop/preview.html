<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Browser Preview</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #1a1715;
        color: #fdf7f2;
        display: flex;
        flex-direction: column;
      }

      body.embedded {
        background: rgba(28, 24, 23, 0.95);
        min-height: 100vh;
      }

      /* ── Status overlay ── */
      .status {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        text-align: center;
        padding: 20px;
        pointer-events: none;
      }
      .status-text {
        font-size: 0.85rem;
        color: rgba(255, 247, 239, 0.6);
        margin: 0;
      }
      .status-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(255, 247, 239, 0.15);
        border-top-color: #f97316;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .status-error { color: #ef4444; }
      .status-ok { color: #22c55e; font-size: 0.75rem; }

      /* ── Frame viewer ── */
      .frame-container {
        position: relative;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        min-height: 200px;
      }
      .frame-container img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
      }

      /* ── Controls ── */
      .controls {
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 10px 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      body.embedded .controls { display: none; }

      .btn {
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        padding: 6px 14px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 247, 239, 0.8);
        cursor: pointer;
        font-size: 0.78rem;
      }
      .btn:hover { background: rgba(255, 255, 255, 0.12); }
      .btn-primary { background: #f97316; border-color: #f97316; color: #fff; }
      .btn-primary:hover { background: #ea580c; }
    </style>
  </head>
  <body>
    <div class="frame-container" id="container">
      <img id="frameImage" alt="Browser viewport" style="display:none" />
      <div class="status" id="statusOverlay">
        <div class="status-spinner" id="spinner"></div>
        <p class="status-text" id="statusText">Connecting to browser stream...</p>
      </div>
    </div>

    <div class="controls" id="controls">
      <button class="btn" type="button" onclick="reconnect()">Reconnect</button>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const isEmbedded = params.get('embedded') === '1';
      const streamPort = params.get('streamPort');

      if (isEmbedded) {
        document.body.classList.add('embedded');
      }

      const img = document.getElementById('frameImage');
      const overlay = document.getElementById('statusOverlay');
      const spinner = document.getElementById('spinner');
      const statusText = document.getElementById('statusText');

      let ws = null;

      function setStatus(mode, text) {
        overlay.style.display = 'flex';
        spinner.style.display = mode === 'connecting' || mode === 'waiting' ? 'block' : 'none';
        statusText.textContent = text;
        statusText.className = 'status-text' + (mode === 'error' ? ' status-error' : '') + (mode === 'ok' ? ' status-ok' : '');
        if (mode !== 'connected' || !img.src) {
          img.style.display = 'none';
        }
      }

      function setFrame(base64data) {
        img.src = 'data:image/jpeg;base64,' + base64data;
        img.style.display = 'block';
        overlay.style.display = 'none';
        statusText.textContent = 'Live';
        statusText.className = 'status-text status-ok';
      }

      function connect() {
        if (!streamPort) {
          setStatus('error', 'No stream port specified. Add ?streamPort=9223 to the URL.');
          return;
        }
        setStatus('connecting', 'Connecting to browser stream...');
        closeWs();

        try {
          ws = new WebSocket('ws://127.0.0.1:' + streamPort);
        } catch (e) {
          setStatus('error', 'WebSocket connection failed: ' + e.message);
          return;
        }

        ws.onopen = () => {
          setStatus('waiting', 'Connected. Waiting for browser frames...');
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'frame' && msg.data) {
              setFrame(msg.data);
            }
          } catch { /* ignore malformed frames */ }
        };

        ws.onerror = () => {
          setStatus('error', 'WebSocket error');
        };

        ws.onclose = () => {
          if (img.style.display !== 'block') {
            setStatus('error', 'Stream disconnected. Task may not be running.');
          }
          // Don't show error if we already had frames — the image stays
          if (img.style.display !== 'block') {
            img.style.display = 'none';
          }
        };
      }

      function closeWs() {
        if (ws) {
          try { ws.close(); } catch { /* */ }
          ws = null;
        }
      }

      function reconnect() {
        closeWs();
        img.src = '';
        img.style.display = 'none';
        connect();
      }

      // Auto-connect
      connect();
    </script>
  </body>
</html>
