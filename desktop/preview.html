<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Browser Preview</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Manrope, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, rgba(249, 115, 22, 0.22), transparent 28%),
          linear-gradient(180deg, #111111 0%, #1a1715 100%);
        color: #fdf7f2;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      header,
      footer {
        padding: 18px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      footer {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: 0;
      }

      .frame {
        margin: 20px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        display: grid;
        place-items: center;
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }

      p {
        color: rgba(255, 247, 239, 0.72);
        max-width: 560px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: #f97316;
        color: white;
        cursor: pointer;
      }

      body.embedded footer {
        display: none;
      }

      body.embedded .frame {
        margin: 16px;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Live browser preview</strong>
    </header>
    <div class="frame">
      <div>
        <h1>Streaming surface placeholder</h1>
        <p>
          This window is reserved for the browser stream, current step, and direct human handoff controls.
          Wire it to the existing agent-browser streaming endpoint when the executor starts driving a real session.
        </p>
      </div>
    </div>
    <footer>
      <button type="button" onclick="window.close()">Close preview</button>
    </footer>
    <script>
      const isEmbedded = new URLSearchParams(window.location.search).get('embedded') === '1';
      if (isEmbedded) {
        document.body.classList.add('embedded');
      }
    </script>
  </body>
</html>
